<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>GTA VI - Site vitrine</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>

  <!-- ===== EN-TÊTE (commun à tout le site) ===== -->
  <header>
    <nav>
      <!-- Le logo et le menu de navigation viendront ici -->
    </nav>
  </header>

  <!-- ===== CONTENU PRINCIPAL ===== -->
  <main>

    <!-- Section d'accroche avec le compte à rebours -->
    <section id="hero">
        <div class="hero-content">
            <h1>Grand Theft Auto VI</h1>
            <p>Le jeu le plus attendu de l'année bientôt disponible!</p>

            <div id="countdown">
                  <div class="countdown-item">
                  <span id="days">00</span>
                  <label>Jours</label>
                </div>
                  <div class="countdown-item">
                  <span id="hours">00</span>
                  <label>Heures</label>
                </div>
                  <div class="countdown-item">
                  <span id="minutes">00</span>
                  <label>Minutes</label>
                </div>
                  <div class="countdown-item">
                  <span id="seconds">00</span>
                  <label>Secondes</label>
                </div>
            </div>
        </div>
    </section>
    <!-- Présentation du jeu -->
    <section id="presentation">
    </section>

    <!-- Les personnages : Lucia & Jason -->
    <section id="personnages">
    </section>

    <!-- Le décor : Vice City / Leonida -->
    <section id="decor">
    </section>

    <!-- La galerie d'images -->
    <section id="galerie">
    </section>

    <!-- Les infos de sortie -->
    <section id="sortie">
    </section>

  </main>

  <!-- ===== PIED DE PAGE (commun à tout le site) ===== -->
  <footer>
  </footer>

  <script src="script.js" defer></script>
    </body>    

</html>
